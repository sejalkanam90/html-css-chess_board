<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="chess_board">

        <!-- Row 1 - Black pieces -->
        <div class="box1">&#9820;</div>
        <div class="box2">&#9822;</div>
        <div class="box1">&#9821;</div>
        <div class="box2">&#9819;</div>
        <div class="box1">&#9818;</div>
        <div class="box2">&#9821;</div>
        <div class="box1">&#9822;</div>
        <div class="box2">&#9820;</div>

        <!-- Row 2 - Black pawns -->
        <div class="box2">&#9823;</div>
        <div class="box1">&#9823;</div>
        <div class="box2">&#9823;</div>
        <div class="box1">&#9823;</div>
        <div class="box2">&#9823;</div>
        <div class="box1">&#9823;</div>
        <div class="box2">&#9823;</div>
        <div class="box1">&#9823;</div>

        <!-- Row 3 -->
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>

        <!-- Row 4 -->
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>

        <!-- Row 5 -->
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>

        <!-- Row 6 -->
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>
        <div class="box2"></div>
        <div class="box1"></div>

        <!-- Row 7 - White pawns -->
        <div class="box1">&#9817;</div>
        <div class="box2">&#9817;</div>
        <div class="box1">&#9817;</div>
        <div class="box2">&#9817;</div>
        <div class="box1">&#9817;</div>
        <div class="box2">&#9817;</div>
        <div class="box1">&#9817;</div>
        <div class="box2">&#9817;</div>

        <!-- Row 8 - White pieces -->
        <div class="box2">&#9814;</div>
        <div class="box1">&#9816;</div>
        <div class="box2">&#9815;</div>
        <div class="box1">&#9813;</div>
        <div class="box2">&#9812;</div>
        <div class="box1">&#9815;</div>
        <div class="box2">&#9816;</div>
        <div class="box1">&#9814;</div>
    </div>









</body>

</html>
